# R-Variation: measurement_noise_r = 0.001, Q fixiert auf 0.01
# Kleines R = Filter vertraut der Messung stark (aggressive Korrektur)
# Grosses R = Filter vertraut der Messung wenig (glatter, reagiert langsam)
#
# WICHTIG: init_x/init_y = 0,0 (KORREKTE Initialisierung) -- isolierte
# Messung des R-Effekts, ohne Wrong-Init-Einfluss.
kf_node:
  ros__parameters:
    init_x: 0.0
    init_y: 0.0
    init_cov_x: 0.01
    init_cov_y: 0.01
    process_noise_q: 0.01
    measurement_noise_r: 0.001
    odom_topic: '/odom'
    output_topic: '/kf/pose'
    frame_id: 'odom'
ekf_node:
  ros__parameters:
    init_x: 0.0
    init_y: 0.0
    init_yaw: 0.0
    init_cov_x: 0.01
    init_cov_y: 0.01
    init_cov_yaw: 0.01
    process_noise_q: 0.01
    measurement_noise_r: 0.001
    odom_topic: '/odom'
    cmd_topic: '/diffdrive_controller/cmd_vel'
    output_topic: '/ekf/pose'
    frame_id: 'odom'
pf_node:
  ros__parameters:
    init_x: 0.0
    init_y: 0.0
    init_yaw: 0.0
    init_spread_x: 0.1
    init_spread_y: 0.1
    init_spread_yaw: 0.05
    num_particles: 500
    process_noise_v: 0.3
    process_noise_w: 0.2
    measurement_noise_r: 0.001
    measurement_noise_yaw: 0.3
    odom_topic: '/odom'
    cmd_topic: '/diffdrive_controller/cmd_vel'
    output_topic: '/pf/pose'
    particles_topic: '/pf/particles'
    frame_id: 'odom'
