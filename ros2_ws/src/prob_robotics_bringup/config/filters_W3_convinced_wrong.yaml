# W3: GROSSER Wrong-Init-Offset (1.0, 2.0) MIT KLEINER Anfangsunsicherheit.
#
# KERNFRAGE DES PROJEKTS: Der Filter ist falsch initialisiert UND glaubt
# fest daran (init_cov sehr klein = "ich bin mir sicher"). Wird der Fehler
# "mitgezogen" (bleibt lange bestehen), weil der Filter der falschen
# Anfangsannahme zu sehr vertraut und der Messung zu wenig Gewicht gibt?
#
# Fuer KF/EKF: kleine init_cov -> Kalman-Gain bei der ersten Messung ist
# klein -> der Filter korrigiert sich nur langsam.
# Fuer PF: enger init_spread -> die Partikelwolke deckt die wahre Pose
# evtl. gar nicht ab -> Filter kann komplett divergieren.
kf_node:
  ros__parameters:
    init_x: 1.0
    init_y: 2.0
    init_cov_x: 0.001
    init_cov_y: 0.001
    process_noise_q: 0.01
    measurement_noise_r: 0.05
    odom_topic: '/odom'
    output_topic: '/kf/pose'
    frame_id: 'odom'
ekf_node:
  ros__parameters:
    init_x: 1.0
    init_y: 2.0
    init_yaw: 0.5
    init_cov_x: 0.001
    init_cov_y: 0.001
    init_cov_yaw: 0.001
    process_noise_q: 0.01
    measurement_noise_r: 0.05
    odom_topic: '/odom'
    cmd_topic: '/diffdrive_controller/cmd_vel'
    output_topic: '/ekf/pose'
    frame_id: 'odom'
pf_node:
  ros__parameters:
    init_x: 1.0
    init_y: 2.0
    init_yaw: 0.5
    init_spread_x: 0.05
    init_spread_y: 0.05
    init_spread_yaw: 0.02
    num_particles: 500
    process_noise_v: 0.3
    process_noise_w: 0.2
    measurement_noise_r: 0.3
    measurement_noise_yaw: 0.3
    odom_topic: '/odom'
    cmd_topic: '/diffdrive_controller/cmd_vel'
    output_topic: '/pf/pose'
    particles_topic: '/pf/particles'
    frame_id: 'odom'
