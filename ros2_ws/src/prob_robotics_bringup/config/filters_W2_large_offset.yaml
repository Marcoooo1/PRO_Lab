# W2: GROSSER Wrong-Init-Offset (1.0, 2.0), moderate Unsicherheit.
# Frage: wie verhaelt sich die Konvergenz bei einem grossen Init-Fehler?
kf_node:
  ros__parameters:
    init_x: 1.0
    init_y: 2.0
    init_cov_x: 0.5
    init_cov_y: 0.5
    process_noise_q: 0.01
    measurement_noise_r: 0.05
    odom_topic: '/odom'
    output_topic: '/kf/pose'
    frame_id: 'odom'
ekf_node:
  ros__parameters:
    init_x: 1.0
    init_y: 2.0
    init_yaw: 0.5
    init_cov_x: 0.5
    init_cov_y: 0.5
    init_cov_yaw: 0.1
    process_noise_q: 0.01
    measurement_noise_r: 0.05
    odom_topic: '/odom'
    cmd_topic: '/diffdrive_controller/cmd_vel'
    output_topic: '/ekf/pose'
    frame_id: 'odom'
pf_node:
  ros__parameters:
    init_x: 1.0
    init_y: 2.0
    init_yaw: 0.5
    init_spread_x: 0.3
    init_spread_y: 0.3
    init_spread_yaw: 0.2
    num_particles: 500
    process_noise_v: 0.3
    process_noise_w: 0.2
    measurement_noise_r: 0.3
    measurement_noise_yaw: 0.3
    odom_topic: '/odom'
    cmd_topic: '/diffdrive_controller/cmd_vel'
    output_topic: '/pf/pose'
    particles_topic: '/pf/particles'
    frame_id: 'odom'
